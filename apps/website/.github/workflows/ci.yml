name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-check:
    name: backend-check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/website/backend/ai-generator-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/website/backend/ai-generator-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: JavaScript syntax check
        run: node --check server.js

      - name: Run lint (if present)
        run: npm run lint --if-present

      - name: Run tests (if present)
        run: npm test --if-present

      - name: Run build (if present)
        run: npm run build --if-present